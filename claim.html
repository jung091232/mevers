<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Meverse | Claim</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: sans-serif;
      height: 100vh;
    }
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    .center-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      padding: 20px;
    }
    .claim-card {
      background: rgba(0, 0, 0, 0.85);
      padding: 30px;
      border-radius: 20px;
      border: 2px solid #00ffc3;
      box-shadow: 0 0 20px #00ffc3;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .cta-button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      font-weight: bold;
      background: #00ffc3;
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 10px #00ffc3;
    }
    .cta-button:hover {
      background: #fff700;
      box-shadow: 0 0 12px #fff700;
    }
    #claim-info p {
      margin: 10px 0;
      font-size: 16px;
    }
    h2 {
      color: #00ffc3;
    }
    #wallet-address {
      color: #00ff90;
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>
  <div class="center-wrapper">
    <div class="claim-card">
      <h2>🎁 Claim Your Rewards</h2>
      <p>Connected wallet: <span id="wallet-address">Not connected</span></p>

      <div id="claim-info">
        <p>🪙 Presale: <span id="presale">0</span> MVS</p>
        <p>📈 Staking: <span id="staking">0</span> MVS</p>
        <p>🎁 Referral: <span id="referral">0</span> MVS</p>
      </div>

      <button class="cta-button" onclick="connectAndLoad()">📍 지갑 연결</button>
      <button onclick="claim('presale')" class="cta-button">Claim Presale</button>
      <button onclick="claim('staking')" class="cta-button">Claim Staking</button>
      <button onclick="claim('referral')" class="cta-button">Claim Referral</button>
    </div>
  </div>

  <script>
    particlesJS.load('particles-js', 'particles.json', function() {
      console.log('particles.js loaded');
    });
  </script>
  <script src="claim.js"></script>
</body>
</html>
