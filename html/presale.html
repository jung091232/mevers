
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Meverse | Presale</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
</head>
<body>
  <div id="particles-js"></div>
  <section class="presale-hero">
    <h1>🚀 Join the Meverse Presale</h1>
    <p>Connect your wallet and be part of the Meme Revolution.</p>
    <div class="presale-card" style="max-width: 1000px;">
      <button onclick="connectWallet()" class="cta-button">🔌 Connect Wallet</button>
      <p id="wallet-address" class="wallet-box">Wallet: Not Connected</p>

      <label for="currency" style="color:#00ffc3;">Select Payment Method:</label>
      <select id="currency" class="presale-input">
        <option value="BNB">BNB</option>
        <option value="ETH">ETH</option>
        <option value="USDT">USDT</option>
      </select>

      <input type="number" id="amount" placeholder="Enter amount (ex: 0.05)" />
      <button onclick="buyTokens()" class="cta-button">💸 Buy MVS</button>
      <p id="status" class="status-text"></p>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <script>
    particlesJS.load('particles-js', 'particles.json', function() {
      console.log('particles.js loaded');
    });
  </script>
  <script src="presale.js"></script>
</body>
</html>
